<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>添加学生</title>
</head>
<body>
    <h1>添加学生信息</h1>
    <button onclick="addStudent()">点击添加学生</button>
    <div id="result"></div>
    
    <script>
        async function addStudent() {
            const studentData = {
                username: "newstu001",
                password: "123456",
                name: "新学生",
                age: 20,
                gender: "男",
                phoneNum: "13900001111",
                email: "newstudent@example.com",
                college: "信息工程学院",
                className: "软件工程2024-1班"
            };
            
            try {
                const response = await fetch('http://localhost:9090/stu/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(studentData)
                });
                
                const result = await response.text();
                document.getElementById('result').innerHTML = 
                    '<h3>响应:</h3><pre>' + result + '</pre>';
                console.log('响应:', result);
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<h3>错误:</h3><pre>' + error + '</pre>';
                console.error('错误:', error);
            }
        }
    </script>
</body>
</html>
